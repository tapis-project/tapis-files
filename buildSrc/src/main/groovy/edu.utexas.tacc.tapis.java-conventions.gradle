/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
}

repositories {
    mavenLocal()
    maven {
        url = uri('http://c002.rodeo.tacc.utexas.edu:30044/repository/maven-snapshots')
    }

    maven {
        url = uri('http://c002.rodeo.tacc.utexas.edu:30044/repository/maven-releases')
    }

    maven {
        url = uri('http://oss.sonatype.org/content/repositories/snapshots')
    }

    maven {
        url = uri('https://oss.sonatype.org/content/repositories/releases/')
    }

    maven {
        url = uri('https://jitpack.io')
    }

    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation 'org.jetbrains:annotations:20.1.0'
    implementation 'org.flywaydb:flyway-core:6.0.8'
    implementation 'org.postgresql:postgresql:42.2.6'
    implementation 'org.slf4j:slf4j-api:1.7.25'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.10.1'
    implementation 'edu.utexas.tacc.tapis:systems-client:1.11.61'
    implementation 'edu.utexas.tacc.tapis:tokens-client:1.11.61'
    implementation 'edu.utexas.tacc.tapis:tenants-client:1.11.61'
    implementation 'edu.utexas.tacc.tapis:security-client:1.11.61'
    implementation 'javax.validation:validation-api:2.0.1.Final'
    implementation 'org.hibernate.validator:hibernate-validator:6.1.6.Final'
    implementation 'com.squareup.okhttp3:okhttp:4.2.2'
    testImplementation 'org.mockito:mockito-core:3.0.0'
    testImplementation 'org.testng:testng:6.14.3'
    testImplementation 'io.projectreactor:reactor-test:3.2.3.RELEASE'
}

group = 'edu.utexas.tacc.tapis'
version = '1.1'
java.sourceCompatibility = JavaVersion.VERSION_15


tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.named('test') {
    useTestNG()
}

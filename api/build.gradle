plugins {
    id 'edu.utexas.tacc.tapis.java-conventions'
}

dependencies {
    implementation 'edu.utexas.tacc.tapis:tapis-shared-api:1.11.71'
    implementation project(':tapis-files-lib')
    implementation project(':tapis-files-migrations')
    implementation 'software.amazon.awssdk:s3:2.13.11'
    implementation 'org.glassfish.jersey.ext:jersey-bean-validation:2.30'
    implementation 'io.swagger.core.v3:swagger-jaxrs2:2.0.10'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.10.1'
    implementation 'org.glassfish.jersey.media:jersey-media-multipart:2.30'
    implementation 'org.glassfish.jersey.core:jersey-common:2.30'
    implementation 'org.glassfish.jersey.inject:jersey-hk2:2.30'
    implementation 'org.glassfish.jersey.containers:jersey-container-grizzly2-http:2.30'
    implementation 'org.glassfish.jersey.test-framework:jersey-test-framework-core:2.30'
    implementation 'org.glassfish.jersey.test-framework.providers:jersey-test-framework-provider-grizzly2:2.30'
    implementation 'org.glassfish.jersey.media:jersey-media-json-jackson:2.30'
}

description = 'tapis-files-api'
